config:
  namespaces: 1
  projectsPerNs: 1
  appsPerProject: 1
  leafAppsPerAppOfApp: 1

  repoURL: "http://gitea.git1.svc:3000/admin/gitops-examples.git"
  targetRevision: "main"

  # Base path in the repo under which the charts live.
  basePath: "argocd-agent"

  # Namespace where Argo CD watches for Application resources.
  argocdNamespace: "openshift-gitops"

  # Leave leaves unautomated so they populate the UI without
  # hammering the repo-server. Set to true to exercise full sync.
  automateLeaves: false
